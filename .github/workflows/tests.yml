name: Tests

on:
  push:
    branches:
      - main
      - master
  pull_request:

permissions:
  actions: write
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Julia
        uses: julia-actions/setup-julia@v2
        with:
          version: '1'
          show-versioninfo: true

      - name: Cache Julia depot
        uses: julia-actions/cache@v2

      - name: Add registries and instantiate
        run: |
          julia --project=. -e '
            using Pkg;
            Pkg.Registry.add("General");
            Pkg.Registry.add(Pkg.RegistrySpec(url="https://visual2.cs.ovgu.de/roessl/VCJuliaRegistry"));
            Pkg.add(url="https://github.com/vchuravy/TaskLocalValues.jl");
            Pkg.instantiate();
          '

      - name: Build packages
        run: |
          julia --project=. -e '
            using Pkg;
            Pkg.build();
          '

      - name: Run tests with coverage
        run: julia --project=. --code-coverage=user test/runtests.jl

      - name: Install coverage tools
        run: |
          julia --project=. -e '
            using Pkg;
            Pkg.add("Coverage");
          '        

      - name: Generate coverage summary
        run: |
          julia --project=. -e '
            using Coverage;

            coverage = process_folder("src");
            covered = get_summary(coverage);

            println("Coverage: ", covered);
          '

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v5